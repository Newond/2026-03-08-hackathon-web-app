# Cloudflare Pages デプロイ用 GitHub Actions ワークフロー
#
# 使い方:
#   このファイルを .github/workflows/ にコピー（またはシンボリックリンク）して使用してください。
#   例: cp cicd/deploy-cloudflare-pages.yml .github/workflows/deploy.yml
#
# 必要な GitHub Secrets:
#   - CLOUDFLARE_API_TOKEN: Cloudflare の API トークン
#   - CLOUDFLARE_ACCOUNT_ID: Cloudflare のアカウント ID

name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=${{ github.event.repository.name }}
